<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DimScan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.1);--accent:#0ff;--accent2:#ff6b35;--green:#39ff14;
  --red:#ff4466;--text:#dde4f0;--muted:rgba(221,228,240,0.4);
  --mono:'DM Mono',monospace;--display:'Bebas Neue',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:var(--mono);overflow:hidden;touch-action:none;
  -webkit-tap-highlight-color:transparent;user-select:none}

/* ── VIDEO + CANVAS ── */
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
#cvs{position:fixed;inset:0;width:100%;height:100%;z-index:2}
#scanlines{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);opacity:.45}

/* ── UI SHELL ── */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}

/* ── HEADER ── */
#hdr{pointer-events:all;padding:16px 18px 0;display:flex;align-items:flex-start;justify-content:space-between}
.wm{font-family:var(--display);font-size:26px;letter-spacing:3px;line-height:1}
.wm em{color:var(--accent);font-style:normal}
.wm small{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);vertical-align:super}

/* ── INFO BADGE (top right) ── */
#badge{position:absolute;top:16px;right:18px;pointer-events:none;
  background:rgba(6,8,16,.82);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);backdrop-filter:blur(10px);line-height:2;text-align:right;display:none}
#badge b{font-size:13px;color:var(--text);font-weight:500;display:block;letter-spacing:0}
#badge.good{border-color:rgba(57,255,20,.5);color:var(--green)}
#badge.warn{border-color:rgba(255,107,53,.4);color:var(--accent2)}

/* ── CROSSHAIR ── */
#xh{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;pointer-events:none}
#xh::before,#xh::after{content:'';position:absolute;background:rgba(0,255,255,.65)}
#xh::before{width:1px;height:100%;left:50%;transform:translateX(-50%)}
#xh::after{height:1px;width:100%;top:50%;transform:translateY(-50%)}
.xhr{position:absolute;inset:7px;border-radius:50%;border:1px solid rgba(0,255,255,.4);
  animation:xhp 2s ease-in-out infinite}
@keyframes xhp{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.12)}}

/* ── STATUS PILL ── */
#spill{position:absolute;top:calc(50% + 40px);left:50%;transform:translateX(-50%);
  background:rgba(6,8,16,.84);border:1px solid var(--border);border-radius:100px;
  padding:7px 18px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);backdrop-filter:blur(14px);transition:all .3s;
  white-space:nowrap;max-width:88vw;text-align:center;pointer-events:none}
#spill.on{border-color:rgba(0,255,255,.5);color:var(--accent)}
#spill.ok{border-color:rgba(57,255,20,.5);color:var(--green)}
#spill.wa{border-color:rgba(255,107,53,.5);color:var(--accent2)}

/* ── HISTORY (top left) ── */
#hist{position:absolute;top:90px;left:16px;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.hi{background:rgba(6,8,16,.82);border:1px solid var(--border);border-radius:7px;
  padding:6px 10px;backdrop-filter:blur(8px);animation:hsl .2s ease}
@keyframes hsl{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
.hv{font-size:14px;color:var(--accent);font-weight:500}
.hl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* ── BOTTOM PANEL ── */
#panel{pointer-events:all;padding:0 15px 30px;
  background:linear-gradient(to top,rgba(6,8,16,.98) 65%,transparent)}

/* big number */
#mv{font-family:var(--display);font-size:72px;line-height:1;color:var(--accent);
  letter-spacing:2px;text-shadow:0 0 40px rgba(0,255,255,.3);
  text-align:center;padding-top:10px;transition:color .2s}
#mv.pop{animation:mpop .28s ease}
#mv.px{color:var(--accent2);text-shadow:0 0 30px rgba(255,107,53,.3)}
@keyframes mpop{50%{text-shadow:0 0 100px rgba(0,255,255,.9)}}
#mu{font-size:11px;color:var(--muted);text-align:center;letter-spacing:1px;margin-bottom:3px;min-height:16px}
#ms{font-size:10px;color:var(--muted);text-align:center;letter-spacing:.5px;padding-bottom:10px;min-height:15px}

/* unit row */
#urow{display:flex;justify-content:center;gap:4px;margin-bottom:11px}
.ub{background:var(--glass);border:1px solid var(--border);color:var(--muted);
  font-family:var(--mono);font-size:11px;font-weight:500;padding:6px 15px;
  border-radius:6px;cursor:pointer;transition:all .2s}
.ub.on{background:rgba(0,255,255,.12);border-color:var(--accent);color:var(--accent)}

/* ── CAL PANEL ── */
#calbox{background:var(--glass);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:10px}
.caltitle{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.caltitle span{color:var(--accent);font-size:10px}

/* step indicators */
#steps{display:flex;gap:6px;margin-bottom:10px}
.step{flex:1;border-radius:7px;padding:8px 6px;border:1px solid var(--border);
  background:none;text-align:center;font-family:var(--mono);font-size:10px;
  color:var(--muted);cursor:pointer;transition:all .2s;line-height:1.5}
.step:active{transform:scale(.97)}
.step.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,255,.08)}
.step.done{border-color:var(--green);color:var(--green);background:rgba(57,255,20,.07)}
.step.current{border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,53,.08);
  animation:sblink .9s ease infinite alternate}
@keyframes sblink{from{opacity:.7}to{opacity:1}}
.step-num{font-size:16px;display:block;margin-bottom:2px}

/* ref input row */
#refrow{display:flex;align-items:center;gap:8px;
  padding:8px 10px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:6px}
.rl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);flex-shrink:0}
#rval{background:none;border:none;outline:none;font-family:var(--mono);font-size:16px;
  font-weight:500;color:var(--text);width:65px;text-align:right}
#runit{font-size:11px;color:var(--muted)}
.rdiv{width:1px;height:16px;background:var(--border);margin:0 4px}
.rhint{font-size:10px;color:var(--muted);flex:1;line-height:1.4}

/* action buttons */
#btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:2px}
.ab{border:none;cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:500;
  letter-spacing:.5px;border-radius:10px;padding:13px;display:flex;align-items:center;
  justify-content:center;gap:7px;transition:all .15s}
.ab:active{transform:scale(.97)}
.ab-p{background:var(--accent);color:#000;grid-column:span 2;font-size:13px;
  box-shadow:0 0 28px rgba(0,255,255,.18)}
.ab-p:hover{box-shadow:0 0 46px rgba(0,255,255,.38)}
.ab-s{background:var(--glass2);border:1px solid var(--border);color:var(--text)}
.ab-d{background:rgba(255,68,102,.1);border:1px solid rgba(255,68,102,.22);color:var(--red)}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s}
#loading.gone{opacity:0;pointer-events:none}
.lt{font-family:var(--display);font-size:52px;letter-spacing:4px}
.lt em{color:var(--accent);font-style:normal}
.ls{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.lb{width:220px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.lf{height:100%;width:0;background:var(--accent);transition:width .35s ease;box-shadow:0 0 10px var(--accent)}
#lmsg{font-size:10px;color:var(--muted);letter-spacing:1px;min-height:15px}
#lcb{display:none;background:var(--accent);color:#000;border:none;cursor:pointer;
  font-family:var(--mono);font-size:13px;font-weight:500;border-radius:10px;
  padding:14px 36px;box-shadow:0 0 36px rgba(0,255,255,.28);transition:all .2s;letter-spacing:.5px;margin-top:6px}
</style>
</head>
<body>

<div id="loading">
  <div class="lt">DIM<em>SCAN</em></div>
  <div class="ls">Precision Measurement</div>
  <div class="lb"><div class="lf" id="lf"></div></div>
  <div id="lmsg">Starting…</div>
  <button id="lcb" onclick="boot()">Enable Camera →</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="cvs"></canvas>
<div id="scanlines"></div>

<div id="ui">
  <div id="hdr">
    <div class="wm">Dim<em>Scan</em> <small>PRO</small></div>
  </div>

  <div id="badge">
    <span id="bdlbl">Mode</span>
    <b id="bdval">—</b>
    <span id="bdsub"></span>
  </div>

  <div id="xh"><div class="xhr"></div></div>
  <div id="spill">Point camera at a surface</div>
  <div id="hist"></div>

  <div id="panel">
    <div id="mv">—</div>
    <div id="mu"></div>
    <div id="ms">Calibrate below, then tap to measure</div>

    <div id="urow">
      <button class="ub on" id="ub-cm" onclick="setUnit('cm')">cm</button>
      <button class="ub"    id="ub-in" onclick="setUnit('in')">in</button>
      <button class="ub"    id="ub-mm" onclick="setUnit('mm')">mm</button>
      <button class="ub"    id="ub-m"  onclick="setUnit('m')">m</button>
    </div>

    <!-- CALIBRATION: 3-step guided flow -->
    <div id="calbox">
      <div class="caltitle">
        Calibration
        <span id="calst">Not calibrated</span>
      </div>

      <div id="steps">
        <div class="step current" id="s1" onclick="goStep(1)">
          <span class="step-num">①</span>Set size
        </div>
        <div class="step" id="s2" onclick="goStep(2)">
          <span class="step-num">②</span>Tap P1
        </div>
        <div class="step" id="s3" onclick="goStep(3)">
          <span class="step-num">③</span>Tap P2
        </div>
      </div>

      <div id="refrow">
        <span class="rl">Object size</span>
        <input type="number" id="rval" value="8.56" min="0.01" step="0.01" oninput="onRefChange()">
        <span id="runit">cm</span>
        <div class="rdiv"></div>
        <span class="rhint" id="rhint">e.g. credit card = 8.56 cm wide</span>
      </div>

      <div style="display:flex;gap:6px">
        <button class="ab ab-s" style="flex:1;font-size:11px" onclick="quickCal('card')">💳 Card 8.56cm</button>
        <button class="ab ab-s" style="flex:1;font-size:11px" onclick="quickCal('a4')">📄 A4 29.7cm</button>
      </div>
    </div>

    <div id="btns">
      <button class="ab ab-p" id="mb" onclick="mainBtn()">
        <span id="mi">📍</span><span id="ml">Start Measuring</span>
      </button>
      <button class="ab ab-s" onclick="undoPt()">↩ Undo</button>
      <button class="ab ab-d" onclick="clearAll()">✕ Clear</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S = {
  unit: 'cm',
  // Calibration
  calStep: 1,        // 1=set size, 2=tap P1, 3=tap P2
  calPts: [],        // calibration points [{sx,sy}]
  refSizeCm: 8.56,   // known real size of calibration object
  // focalPx: pixels * real_cm / pixel_width_at_cal = effective focal length
  // Derived: focalPx = calPxDist / refSizeCm
  // At measure time: realCm = measPxDist / focalPx * ( videoW / screenW )
  focalPx: null,
  videoW: 1,         // actual video pixel width (for pixel-space correction)
  screenW: 1,        // screen render width
  // Measurement
  pts: [],           // measurement points [{sx,sy}]
  history: [],
  measuring: false,
};

// ═══════════════════════════════════════════════════════════
//  ELEMENTS
// ═══════════════════════════════════════════════════════════
const video = document.getElementById('video');
const cvs   = document.getElementById('cvs');
const ctx   = cvs.getContext('2d');
const pill  = document.getElementById('spill');
const badge = document.getElementById('badge');
const bdVal = document.getElementById('bdval');
const bdSub = document.getElementById('bdsub');
const mv    = document.getElementById('mv');
const mu    = document.getElementById('mu');
const ms    = document.getElementById('ms');
const hist  = document.getElementById('hist');
const calSt = document.getElementById('calst');

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
async function boot() {
  document.getElementById('lcb').style.display = 'none';
  ld(15, 'Requesting camera…');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    S.videoW  = video.videoWidth  || 1920;
    S.screenW = window.innerWidth;
    resize();
    ld(100, 'Ready');
    await sleep(350);
    document.getElementById('loading').classList.add('gone');
    setStatus('Set object size below, then tap to calibrate', 'on');
    updateSteps();
  } catch(e) {
    ld(0, 'Camera denied — tap to retry');
    document.getElementById('lcb').style.display = 'block';
  }
}

// ═══════════════════════════════════════════════════════════
//  UNITS
// ═══════════════════════════════════════════════════════════
const toM = { cm: 0.01, in: 0.0254, mm: 0.001, m: 1 };
const fmM = { cm: 100,  in: 39.3701, mm: 1000, m: 1 };
function setUnit(u) {
  S.unit = u;
  document.querySelectorAll('.ub').forEach(b => b.classList.remove('on'));
  document.getElementById('ub-' + u).classList.add('on');
  document.getElementById('runit').textContent = u;
  recompute();
  // Convert ref input to new unit
  const cm = parseFloat(document.getElementById('rval').value) * toM[u] * 100;
  S.refSizeCm = cm;
}

// ═══════════════════════════════════════════════════════════
//  CALIBRATION FLOW
// ═══════════════════════════════════════════════════════════
function onRefChange() {
  const v = parseFloat(document.getElementById('rval').value);
  if (!v || v <= 0) return;
  // Convert from current unit to cm
  S.refSizeCm = v * (toM[S.unit] * 100);
}

function quickCal(type) {
  const sizes = { card: { cm: 8.56, label: 'credit card width' }, a4: { cm: 29.7, label: 'A4 width' } };
  const s = sizes[type];
  S.refSizeCm = s.cm;
  // Show in current unit
  const inUnit = (s.cm / 100) * fmM[S.unit];
  document.getElementById('rval').value = inUnit.toFixed(2);
  document.getElementById('rhint').textContent = `${s.label} — now tap its two edges`;
  goStep(2);
}

function goStep(n) {
  // Can only go forward if previous steps are done
  if (n === 2 && !S.refSizeCm) { alert('Enter the object size first'); return; }
  if (n === 3 && S.calPts.length < 1) return;
  S.calStep = n;
  S.calPts  = n === 1 ? [] : S.calPts.slice(0, n - 2);
  updateSteps();
  const msgs = [
    'Enter known object size above',
    'Tap LEFT edge of the object on screen',
    'Tap RIGHT edge of the object on screen',
  ];
  setStatus(msgs[n - 1], 'on');
}

function updateSteps() {
  [1,2,3].forEach(i => {
    const el = document.getElementById('s' + i);
    el.className = 'step';
    if (i < S.calStep) el.classList.add('done');
    else if (i === S.calStep) el.classList.add('current');
  });
}

function finishCalibration() {
  const p1 = S.calPts[0], p2 = S.calPts[1];
  const dx = p2.sx - p1.sx, dy = p2.sy - p1.sy;
  const pxDist = Math.sqrt(dx*dx + dy*dy);

  // focalPx = pixelDistance_on_screen / realSizeCm
  // This is NOT a true focal length — it's "pixels per cm at this distance".
  // To make it zoom-invariant we also store the video/screen ratio at cal time,
  // so we can normalise future measurements to the same coordinate space.
  S.focalPx    = pxDist / S.refSizeCm;         // px/cm at calibration distance
  S.calScreenW = window.innerWidth;             // screen width at cal time
  S.calVideoW  = video.videoWidth || S.videoW; // video resolution at cal time

  S.calStep = 1; // reset cal UI
  S.calPts  = [];
  updateSteps();

  // Badge
  badge.style.display = 'block';
  badge.className = 'good';
  bdVal.textContent = 'Calibrated';
  bdSub.textContent = Math.round(S.focalPx) + ' px/cm';
  calSt.textContent = '✓ ' + S.refSizeCm.toFixed(1) + 'cm ref';

  setStatus('Calibrated ✓  Tap two points to measure', 'ok');
  updateMBtn();
}

// ═══════════════════════════════════════════════════════════
//  TOUCH INPUT
// ═══════════════════════════════════════════════════════════
cvs.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  handleTap(t.clientX, t.clientY);
}, { passive: false });
cvs.addEventListener('click', e => handleTap(e.clientX, e.clientY));

function handleTap(sx, sy) {
  // ── CALIBRATION TAPS ──
  if (S.calStep === 2) {
    S.calPts = [{ sx, sy }];
    goStep(3);
    return;
  }
  if (S.calStep === 3) {
    S.calPts.push({ sx, sy });
    finishCalibration();
    return;
  }

  // ── MEASUREMENT TAPS ──
  if (!S.focalPx) {
    setStatus('Calibrate first — tap the steps above', 'wa');
    return;
  }
  if (S.pts.length >= 2) { S.pts = []; clearDisp(); }
  S.pts.push({ sx, sy });
  updateMBtn();
  if (S.pts.length === 2) compute();
  else setStatus('Tap second point', 'on');
}

function mainBtn() {
  if (S.calStep === 2 || S.calStep === 3) {
    // Place cal point at crosshair
    handleTap(window.innerWidth / 2, window.innerHeight / 2);
  } else {
    handleTap(window.innerWidth / 2, window.innerHeight / 2);
  }
}

function undoPt() {
  if (S.calStep === 3) { goStep(2); return; }
  S.pts.pop(); clearDisp(); updateMBtn();
  if (!S.pts.length) setStatus('Tap to place first point', '');
}

function clearAll() {
  S.pts = []; S.calPts = [];
  clearDisp(); updateMBtn();
  setStatus('Tap to measure', '');
}

function updateMBtn() {
  const mi = document.getElementById('mi'), ml = document.getElementById('ml');
  if (S.calStep === 2) { mi.textContent='📏'; ml.textContent='Tap Cal Point 1'; return; }
  if (S.calStep === 3) { mi.textContent='📏'; ml.textContent='Tap Cal Point 2'; return; }
  const n = S.pts.length;
  if (n === 0) { mi.textContent='📍'; ml.textContent='Place First Point'; }
  else if (n === 1) { mi.textContent='📍'; ml.textContent='Place Second Point'; }
  else { mi.textContent='🔄'; ml.textContent='Measure Again'; }
}

// ═══════════════════════════════════════════════════════════
//  MEASUREMENT — zoom-invariant pinhole model
// ═══════════════════════════════════════════════════════════
//
//  The key insight:
//  At calibration: focalPx = pixDist_cal / refCm
//  At measurement: realCm  = pixDist_meas / focalPx
//
//  This is ONLY correct when measuring objects at THE SAME DISTANCE
//  as the calibration object was. If the camera moves closer/farther
//  the scale changes — that's unavoidable with a single camera and no depth.
//
//  BUT: if we measure two points that are both at the same distance as
//  the calibration plane, focalPx stays correct regardless of zoom.
//  Zoom just changes both pixDist and focalPx proportionally, so they cancel.
//
//  In practice: calibrate with the object on the surface you want to measure,
//  then measure on that same surface. Accuracy is typically ±5% at arm's length.
//
function compute() {
  const p1 = S.pts[0], p2 = S.pts[1];
  const dx = p2.sx - p1.sx, dy = p2.sy - p1.sy;
  const pxDist = Math.sqrt(dx*dx + dy*dy);

  // Correct for any screen size change since calibration
  const screenScale = S.calScreenW / window.innerWidth;
  const correctedPx = pxDist * screenScale;

  const cm = correctedPx / S.focalPx;
  const meters = cm * 0.01;
  showResult(meters, cm);
}

function showResult(meters, cm) {
  const v = meters * fmM[S.unit];
  const lbl = v.toFixed(v < 10 ? 2 : 1);
  mv.textContent = lbl;
  mv.className = 'pop';
  mu.textContent = S.unit;
  ms.textContent = `ref: ${S.refSizeCm.toFixed(1)}cm · ±5% accuracy`;
  setStatus(`${lbl} ${S.unit} ✓`, 'ok');
  S.history.unshift(lbl + ' ' + S.unit);
  if (S.history.length > 5) S.history.pop();
  renderHist();
}

function recompute() { if (S.pts.length === 2) compute(); }

function clearDisp() {
  mv.textContent = '—'; mv.className = '';
  mu.textContent = ''; ms.textContent = 'Tap two points to measure';
}

function renderHist() {
  hist.innerHTML = S.history.map((h, i) =>
    `<div class="hi"><div class="hl">#${S.history.length - i}</div><div class="hv">${h}</div></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════
//  DRAW LOOP
// ═══════════════════════════════════════════════════════════
function startLoop() { (function lp(){ draw(); requestAnimationFrame(lp); })(); }

function draw() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  drawCalPoints();
  drawMeasurePoints();
}

function drawCalPoints() {
  S.calPts.forEach((p, i) => {
    // Orange cal markers
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 22, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,107,53,.15)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 12, 0, Math.PI*2);
    ctx.strokeStyle = '#ff6b35'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ff6b35'; ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 3, 0, Math.PI*2);
    ctx.fillStyle = '#ff6b35'; ctx.fill();
    ctx.font = '500 10px DM Mono,monospace';
    ctx.fillStyle = '#ff6b35'; ctx.textAlign = 'center';
    ctx.fillText('C' + (i+1), p.sx, p.sy + 24);
  });
  // Cal line + label
  if (S.calPts.length === 2) {
    const p1 = S.calPts[0], p2 = S.calPts[1];
    drawDashedLine(p1.sx, p1.sy, p2.sx, p2.sy, '#ff6b35');
    const mx = (p1.sx+p2.sx)/2, my = (p1.sy+p2.sy)/2;
    drawBubble(mx, my - 22, `REF ${S.refSizeCm.toFixed(1)}cm`, '#ff6b35', 'rgba(255,107,53,.12)');
  }
}

function drawMeasurePoints() {
  const pts = S.pts;
  pts.forEach((p, i) => {
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 24, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,255,255,.12)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 13, 0, Math.PI*2);
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 4, 0, Math.PI*2);
    ctx.fillStyle = '#0ff'; ctx.fill();
    ctx.font = '500 10px DM Mono,monospace';
    ctx.fillStyle = '#0ff'; ctx.textAlign = 'center';
    ctx.fillText('P' + (i+1), p.sx, p.sy + 26);
  });
  if (pts.length === 2) {
    drawDashedLine(pts[0].sx, pts[0].sy, pts[1].sx, pts[1].sy, '#0ff');
    const val = mv.textContent;
    if (val !== '—') {
      const mx = (pts[0].sx+pts[1].sx)/2, my = (pts[0].sy+pts[1].sy)/2;
      drawBubble(mx, my - 22, val + ' ' + S.unit, '#0ff', 'rgba(0,255,255,.1)');
    }
  }
}

function drawDashedLine(x1, y1, x2, y2, col) {
  const angle = Math.atan2(y2-y1, x2-x1), perp = angle + Math.PI/2;
  ctx.save();
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = col + 'aa'; ctx.lineWidth = 2; ctx.setLineDash([7,5]);
  ctx.shadowColor = col; ctx.shadowBlur = 6; ctx.stroke();
  ctx.restore();
  [[x1,y1],[x2,y2]].forEach(([tx,ty]) => {
    ctx.beginPath();
    ctx.moveTo(tx+Math.cos(perp)*10, ty+Math.sin(perp)*10);
    ctx.lineTo(tx-Math.cos(perp)*10, ty-Math.sin(perp)*10);
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.setLineDash([]); ctx.shadowBlur = 4; ctx.stroke(); ctx.shadowBlur = 0;
  });
}

function drawBubble(x, y, text, col, bg) {
  ctx.save();
  ctx.font = '600 13px DM Mono,monospace';
  const tw = ctx.measureText(text).width, pw = tw+22, ph = 28;
  ctx.beginPath(); rr(x-pw/2, y-ph/2, pw, ph, 7);
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = col + '99'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = col; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function setStatus(msg, cls) { pill.textContent = msg; pill.className = cls || ''; }
function ld(p, msg) { document.getElementById('lf').style.width = p+'%'; document.getElementById('lmsg').textContent = msg; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; S.screenW = window.innerWidth; }
window.addEventListener('resize', resize);

window.addEventListener('load', () => { resize(); boot(); });
</script>
